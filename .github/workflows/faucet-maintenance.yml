name: Faucet Maintenance

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  faucet-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call faucet maintenance API
        run: |
          response=$(curl --fail --show-error --silent \
            -X POST "${{ secrets.FAUCET_MAINTENANCE_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYSTEM_API_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "$response"
          
