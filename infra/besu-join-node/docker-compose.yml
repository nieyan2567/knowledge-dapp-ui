services:
  besu-node:
    image: ${BESU_IMAGE:-hyperledger/besu:latest}
    container_name: besu-join-node
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RPC_HTTP_PORT:-8545}:8545"
      - "${P2P_PORT:-30303}:30303/tcp"
      - "${P2P_PORT:-30303}:30303/udp"
    volumes:
      - ./data:/var/lib/besu
      - ./network:/network:ro
    command:
      - --data-path=/var/lib/besu
      - --genesis-file=/network/genesis.json
      - --node-private-key-file=/var/lib/besu/key
      - --p2p-host=${NODE_HOST}
      - --p2p-port=30303
      - --bootnodes=${BOOTNODE_ENODE}
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,ADMIN
      - --host-allowlist=*
      - --rpc-http-cors-origins=*
      - --sync-min-peers=1
      - --min-gas-price=0
      - --logging=INFO
